name: Mesh Test
on: workflow_dispatch

jobs:
  bridge:
    name: TIE Bridge
    runs-on: ubuntu-latest
    steps:
      - name: Install Python deps
        run: |
          python3 --version

      - name: Download and run TIE Bridge
        run: |
          curl -sL https://tie-run.v2.site/tie_bridge.py -o tie_bridge.py
          python3 tie_bridge.py --name "tie-github-runner" --api "https://tie-gossip.v2.site" &
          BRIDGE_PID=$!
          echo "Bridge PID: $BRIDGE_PID"
          
          # Ждём 30 секунд и проверяем пиров
          sleep 30
          
          echo ""
          echo "=== Relay peers ==="
          curl -s https://tie-gossip.v2.site/agents/gossip/peers
          echo ""
          
          # Останавливаем bridge
          kill $BRIDGE_PID 2>/dev/null
          echo "Done"
