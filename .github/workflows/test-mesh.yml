# Mesh Agent Lite — GitHub Actions Test
# Runs P2P connectivity tests from GitHub datacenters.
# Manual trigger only (workflow_dispatch).

name: 🔗 Mesh Test

on:
  workflow_dispatch:
    inputs:
      peer_host:
        description: 'Peer address (host:port)'
        required: true
        default: '1.2.3.4:9908'
      test_type:
        description: 'Test type'
        type: choice
        options:
          - quick
          - full
        default: 'quick'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test connectivity
        run: |
          python3 agent_light.py --name "gh-runner" --test --peer ${{ inputs.peer_host }}
